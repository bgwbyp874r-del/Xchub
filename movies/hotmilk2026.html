<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Milk (2025) - Safe Player</title>
    
    <!-- Bootstrap 5.3 CSS - Light Version -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ඇප් එක ක්‍රැෂ් නොවන සරල වර්ණ මාලාවක් (No heavy blurs/shadows) */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: 65px;
        }

        .app-navbar {
            background-color: #121824;
            border-bottom: 1px solid #1e293b;
        }

        /* පින්තූරයේ තිබූ ආකාරයටම සකසන ලද සරල අනතුරු ඇඟවීමේ කොටුව */
        .app-notice {
            background-color: #121824;
            border: 1px solid #d97706;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
        }
        .notice-left {
            color: #ef4444;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        @media (min-width: 576px) {
            .notice-left {
                border-bottom: none;
                border-right: 1px solid #1e293b;
                padding-bottom: 0;
                margin-bottom: 0;
            }
        }
        .notice-right span {
            color: #ef4444;
            font-weight: bold;
        }

        /* සැහැල්ලු වීඩියෝ ප්ලේයර් කොටුව */
        .player-box {
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }
        .video-container iframe, .video-container .poster-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* පෝස්ටර් වීව් එක */
        .poster-view {
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-icon-btn {
            font-size: 55px;
            color: #ffffff;
            cursor: pointer;
        }
        .play-icon-btn:hover {
            color: #ef4444;
        }

        /* ප්ලේයර් එකට පහළින් ඇති බටන් බාර් එක */
        .control-bar {
            background-color: #121824;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .icon-btn {
            color: #cbd5e1;
            background: none;
            border: none;
            font-size: 18px;
            margin-right: 12px;
        }

        /* සර්වර් තෝරන ලිස්ට් එක (Cinesubz ස්ටයිල්) */
        .server-row-btn {
            background-color: #121824;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .server-row-btn:active, .server-row-btn.active {
            background-color: #1e293b;
            border-color: #ef4444;
        }
        .server-row-btn i {
            font-size: 18px;
            margin-right: 12px;
            color: #94a3b8;
        }
        .server-row-btn.active i {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar app-navbar fixed-top py-2">
        <div class="container-fluid px-3">
            <span class="navbar-brand fw-bold text-white mb-0" style="font-size: 16px;">
                <i class="bi bi-play-fill text-danger"></i> CINESUBZ
            </span>
            <i class="bi bi-search text-white"></i>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container px-3 my-3">
        
        <!-- Breadcrumb & Title -->
        <div class="small text-secondary mb-1">Home / Movies</div>
        <h1 class="h5 fw-bold mb-3 text-white">Hot Milk (2025) Sinhala Subtitles | සිංහල උපසිරැසි සමඟ</h1>

        <!-- Safe Warning Notice Box -->
        <div class="app-notice row g-0 align-items-center mb-3">
            <div class="col-sm-3 notice-left">
                EVO Player ☑️<br>CS Player<br>
                <small class="fw-normal text-secondary" style="font-size: 11px;">පමණක් ක්‍රියා කරයි.</small>
            </div>
            <div class="col-sm-9 notice-right ps-sm-3">
                අනෙක් සියලු <span>Player</span> ක්‍රියා කරන්නේ <span>නැත</span>. ඒවා හදන්න ටික කාලයක් යන නිසා ඒවා ඩවුන්ලෝඩ් කරගෙන බලන්න පුළුවන්.
            </div>
        </div>

        <!-- Stable Video Player Stage -->
        <div class="player-box mb-3">
            <div class="video-container" id="playerStage">
                <!-- මුලින්ම පෙන්වන පෝස්ටර් වීව් එක -->
                <div class="poster-view">
                    <i class="bi bi-play-circle-fill play-icon-btn" onclick="startAppPlayer('cs')"></i>
                </div>
            </div>
            
            <!-- Utility Bar -->
            <div class="control-bar">
                <div>
                    <button class="icon-btn" title="Download"><i class="bi bi-download"></i></button>
                    <button class="icon-btn" title="Fullscreen"><i class="bi bi-fullscreen"></i></button>
                    <button class="icon-btn" title="Subtitles"><i class="bi bi-chat-text"></i></button>
                </div>
                <div>
                    <button class="icon-btn text-danger me-0" title="Report"><i class="bi bi-exclamation-triangle-fill"></i></button>
                </div>
            </div>
        </div>

        <!-- Lightweight Server List -->
        <div class="server-list-group">
            
            <div class="server-row-btn active" id="srv-cs" onclick="startAppPlayer('cs')">
                <i class="bi bi-play-btn-fill"></i>
                <div><small class="text-secondary d-block" style="font-size: 11px;">Server</small><b>CS Player</b></div>
            </div>

            <div class="server-row-btn" id="srv-evo" onclick="startAppPlayer('evo')">
                <i class="bi bi-play-btn-fill"></i>
                <div><small class="text-secondary d-block" style="font-size: 11px;">Server</small><b>Evo Player</b></div>
            </div>

            <div class="server-row-btn" id="srv-yt" onclick="startAppPlayer('yt')">
                <i class="bi bi-play-btn-fill"></i>
                <div><small class="text-secondary d-block" style="font-size: 11px;">Trailer</small><b>Youtube</b></div>
            </div>

        </div>

    </div>

    <!-- Mobile-Friendly Light Script Logic -->
    <script>
        const stage = document.getElementById('playerStage');

        // වීඩියෝ ලින්ක් (මෙහි ඇති Embed ලින්ක්ස් ඔබේ අවශ්‍යතාවය අනුව වෙනස් කරගන්න)
        const links = {
            cs: `<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" allowfullscreen></iframe>`,
            evo: `<iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ?autoplay=1" allowfullscreen></iframe>`,
            yt: `<iframe src="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1" allowfullscreen></iframe>`
        };

        function startAppPlayer(key) {
            // Active ක්ලාස් එක මාරු කිරීම
            document.querySelectorAll('.server-row-btn').forEach(b => b.classList.remove('active'));
            
            if(key === 'cs') {
                document.getElementById('srv-cs').classList.add('active');
                stage.innerHTML = links.cs;
            } else if(key === 'evo') {
                document.getElementById('srv-evo').classList.add('active');
                stage.innerHTML = links.evo;
            } else if(key === 'yt') {
                document.getElementById('srv-yt').classList.add('active');
                stage.innerHTML = links.yt;
            }
        }
    </script>

</body>
</html>
