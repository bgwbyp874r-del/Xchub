<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUORBIT - Discover Digital Art</title>
    <style>
        /* Base Setup */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #051318;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Neon Glow Background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, rgba(5, 19, 24, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            color: #a0b0b5;
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #00e5ff;
        }

        .btn-join {
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            border-radius: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        .btn-join:hover {
            background: #ffffff;
            color: #051318;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Hero Layout */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
            padding: 40px 0;
        }

        .hero-left {
            max-width: 600px;
        }

        .main-title {
            font-size: 84px;
            font-weight: 900;
            letter-spacing: 15px;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .sub-text {
            color: #00e5ff;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .cta-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .cta-link::after {
            content: ' →';
        }

        /* Animated Portal Ring */
        .hero-right {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portal-ring {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px #00e5ff, inset 0 0 20px #00e5ff;
            animation: pulse-glow 4s infinite alternate;
        }

        .avatar-silhouette {
            width: 240px;
            height: 360px;
            background: linear-gradient(to bottom, #102a35, #051318);
            clip-path: polygon(30% 0%, 70% 0%, 90% 20%, 85% 60%, 75% 100%, 25% 100%, 15% 60%, 10% 20%);
            z-index: 1;
            opacity: 0.85;
        }

        /* Footer Dashboard Row */
        .dashboard-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 0;
        }

        .stats-group {
            display: flex;
            gap: 60px;
        }

        .stat-item {
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -30px;
            top: 20%;
            height: 60%;
            width: 1px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 10px;
            color: #7a8b90;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .play-video-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn::after {
            content: '';
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #ffffff;
            margin-left: 4px;
        }

        .play-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .socials a {
            color: #7a8b90;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
            100% { box-shadow: 0 0 35px rgba(0, 229, 255, 0.8); }
        }

        @media (max-width: 1024px) {
            .hero-section, .dashboard-footer { flex-direction: column; text-align: center; gap: 40px; }
            .stat-item:not(:last-child)::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="wrapper">
        <header>
            <div class="logo">NUO</div>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">About</a>
                <a href="#">Token</a>
                <a href="#">Roadmap</a>
            </nav>
            <a href="#" class="btn-join">Join Us</a>
        </header>

        <main class="hero-section">
            <div class="hero-left">
                <h1 class="main-title">Nuorbit</h1>
                <div class="sub-text">Discover Digital Art and Collect NFTs</div>
                <a href="#" class="cta-link">Let's Orbit</a>
            </div>

            <div class="hero-right">
                <div class="portal-ring"></div>
                <div class="avatar-silhouette"></div>
            </div>
        </main>

        <footer class="dashboard-footer">
            <div class="stats-group">
                <div class="stat-item">
                    <div class="stat-value">27K+</div>
                    <div class="stat-label">Artists</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">876K+</div>
                    <div class="stat-label">Artwork</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">20K+</div>
                    <div class="stat-label">Auction</div>
                </div>
            </div>

            <div class="play-video-container">
                <div class="play-btn"></div>
                <span class="play-text">Play Video</span>
            </div>

            <div class="socials">
                <a href="#">FB</a>
                <a href="#">IG</a>
                <a href="#">TW</a>
            </div>
        </footer>
    </div>

</body>
</html>
